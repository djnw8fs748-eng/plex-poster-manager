name: Local TUI Tests

on:
  push:
    paths:
      - 'local-tui/**'
      - '.github/workflows/local-tui-tests.yml'
  pull_request:
    paths:
      - 'local-tui/**'
      - '.github/workflows/local-tui-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-tui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt requests

      - name: Run tests
        run: pytest
